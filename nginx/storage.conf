# ----------------------------------------------------------------------
# Template Konfigurasi Nginx Reverse Proxy - Internal Storage Service
# Letakkan file ini di /etc/nginx/sites-available/storage.yourdomain.com
# dan buat symlink ke /etc/nginx/sites-enabled/
# ----------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    
    # Ganti dengan subdomain penyimpanan Anda
    server_name storage.yourdomain.com;

    # Mengalihkan seluruh lalu lintas HTTP ke HTTPS (setelah SSL diaktifkan)
    # return 301 https://$host$request_uri;

    # Batasi ukuran maksimal unggahan file agar sesuai dengan aplikasi (50MB)
    client_max_body_size 50M;

    # Log Akses & Error
    access_log /var/log/nginx/storage_access.log;
    error_log /var/log/nginx/storage_error.log;

    # Proxy ke Express App (port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Konfigurasi Header untuk proxying yang tepat
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Waktu tunggu transfer file besar
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}

